<!DOCTYPE html>
<html lang="es">
  <head>
    <script src="cdn/jquery.js"></script>
    <script src="cdn/jquery.mobile-1.3.2.min.js"></script>
    <script src="cdn/browser@4.js"></script>
    <script src="cdn/cdn.min.js" defer></script>
    <script src="cdn/calendar.min.js"></script>
    <script src="cdn/calendar.jquery.min.js"></script>
    <script src="cdn/calendar.translations.es.js"></script>
    <script src="cdn/p5.min.js"></script>
    <script src="main.js"></script>
    <link rel="stylesheet" href="cdn/jquery.mobile-1.3.2.min.css"/>
    <link rel="stylesheet" href="cdn/daisyui@5.css"/>
    <link rel="stylesheet" href="cdn/themes.css"/>
    <link rel="stylesheet" href="cdn/calendar.js.min.css"/>
    <link rel="stylesheet" href="style.css"/>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body x-data="inicio" x-effect="logocol()">
   <!--main page-->
    <div data-role="page" id="main">
      <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
       <img :src="logo">
       <div style="display: flex;">
        <button data-icon="plus" data-iconpos="notext"></button>
        <a data-ajax="false" class="squircle" data-role="button" data-icon="gear" data-iconpos="notext" href="set.html"></a>
       </div>
      </div>
      <div data-role="content" :data-theme="jqmtheme">
      </div>
      <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!---foter navbar--->
      </div>
    </div>
    <!--note page-->
    <div data-role="page" id="notas">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <span>
       <a data-role="button" href="#edit" data-icon="plus" class="squircle" data-iconpos="right">Nueva nota</a>
      </span>
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--calendar page-->
    <div data-role="page" id="calen">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <!--span>
       <button data-icon="plus" data-iconpos="right">Nuevo evento</button>
      </span-->
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      <div id="calendar"></div>
      <script type="text/javascript">
 $(document).on("pageshow", "#calen", function() {
  // Evitar duplicados si la página se recarga
  if (!$("#calendar").hasClass("calendar-initialized")) {
   
   const options = {
    useLocalStorageForEvents: true,
    // Si __TRANSLATION_OPTIONS no está definido, usa un objeto vacío
    ...(typeof __TRANSLATION_OPTIONS !== 'undefined' ? __TRANSLATION_OPTIONS : {})
   };
   
   $("#calendar").calendarJs(options);
   $("#calendar").addClass("calendar-initialized");
  }
 });
</script>
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--search page-->
    <div data-role="page" id="busca">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <form>
       <input type="search" name="barra-busca" id="barra-busca">
      </form>
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      <p>Coming soon</p>
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--edit page-->
    <div data-role="page" id="edit">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <div>
       <a data-role="button" data-icon="back"  data-iconpos="notext" href="#notas" class="squircle"></a>
      </div>
      <img :src="logo">
      <span style="display: flex; align-items: center;">
       <button data-role="none" class="btn squircle" popovertarget="popadd" style="anchor-name:--addwid">+ widget</button>
       <ul class="dropdown menu rounded-box bg-base-300 squircle" popover id="popadd" style="position-anchor:--addwid">
        <li><button data-role="none" class="squircle edit-btn">Texto</button></li>
       </ul>
       <a data-role="button" data-icon="view" href="#view" class="squircle">Ver</a>
       </span>
     </div>
     <div data-role="content" class="edit-content" :data-theme="jqmtheme">
      <div>
       <label for="namedoc">Nombre:</label>
       <input type="text" name="namedoc" id="namedoc">
      </div>
      <ul data-role="listview" data-inset="true" id="docreate">
       <li pt-type="title">
        <h1 class="setui">Titulo<div data-role="controlgroup" data-type="horizontal">
         <button data-icon="arrow-u" data-iconpos="notext"></button>
         <button data-icon="arrow-d" data-iconpos="notext"></button>
        </div><button data-icon="delete" data-iconpos="notext"></button></h1>
        <span class="setui">
         <input type="text" name="titlewid" value="" />
         <select name="titlestyle" data-native-menu="false" data-mini="true">
          <option value="a">a</option>
          <option value="b">b</option>
          <option value="c">c</option>
          <option value="d">d</option>
          <option value="e">e</option>
         </select>
        </span>
       </li>
       <li pt-type="text">
        <h1 class="setui">Texto<div data-role="controlgroup" data-type="horizontal">
         <button data-icon="arrow-u" data-iconpos="notext"></button>
         <button data-icon="arrow-d" data-iconpos="notext"></button>
         </div><button data-icon="delete" data-iconpos="notext"></button></h1>
        <div class="widui">
         <textarea name="textwid" rows="8" cols="20"></textarea>
         <div data-role="controlgroup" data-type="horizontal">
          <p>Posicion</p>
          <label for="lef">◧</label>
          <input type="radio" name="textpos" id="lef" value="l" checked>
          <label for="cen">▣</label>
          <input type="radio" name="textpos" id="cen" value="c">
          <label for="righ">◨</label>
          <input type="radio" name="textpos" id="righ" value="r">
          <label for="jus">⬛︎</label>
          <input type="radio" name="textpos" id="jus" value="j">
         </div>
        </div>
       </li>
       <!--li pt-type="image">
        <h1 class="setui">Imagen<div data-role="controlgroup" data-type="horizontal">
         <button data-icon="arrow-u" data-iconpos="notext"></button>
         <button data-icon="arrow-d" data-iconpos="notext"></button>
        </div><button data-icon="delete" data-iconpos="notext"></button></h1>
        <input data-role="none" type="file" class="file-input squircle" accept="image/*" name="imgwid" />
        <div>
         <img class="squircle" name="preview" src="" alt="" />
        </div>
       </li-->
       <li pt-type="badge">
        <h1 class="setui">Etiqueta<div data-role="controlgroup" data-type="horizontal">
         <button data-icon="arrow-u" data-iconpos="notext"></button>
         <button data-icon="arrow-d" data-iconpos="notext"></button>
         </div><button data-icon="delete" data-iconpos="notext"></button></h1>
        <span class="setui">
         <input type="text" name="badwid" value="" />
         <select name="badcol" data-native-menu="false" data-mini="true">
          <option value="Primario">Primario</option>
          <option value="Secundario">Secundario</option>
          <option value="Acento">Acento</option>
          <option value="Info">Info</option>
          <option value="Exito">Exito</option>
          <option value="Advertencia">Advertencia</option>
          <option value="Error">Error</option>
         </select>
         <select name="badtheme" data-native-menu="false" data-mini="true">
          <option value="Claro">Claro</option>
          <option value="Oscuro">Oscuro</option>
         </select>
        </span>
       </li>
       <li pt-type="div">
        <h1 class="setui">Divisor<div data-role="controlgroup" data-type="horizontal">
         <button data-icon="arrow-u" data-iconpos="notext"></button>
         <button data-icon="arrow-d" data-iconpos="notext"></button>
         </div><button data-icon="delete" data-iconpos="notext"></button></h1>
       </li>
      </ul>
      <div id="preview">
       
      </div>
      <div id="result">
       
      </div>
     </div>
     <div data-role="footer" class="barui" data-position="fixed" data-fullscreen="true" :data-theme="jqmtheme">
      <input type="color" name="" id="" value="" />
      <div data-role="controlgroup" data-type="horizontal">
       <label for="stng"><strong>B</strong></label>
       <input type="checkbox" name="stng" id="stng">
       <label for="ital"><em>I</em></label>
       <input type="checkbox" name="ital" id="ital">
       <label for="unde"><u>U</u></label>
       <input type="checkbox" name="unde" id="unde">
       <label for="stri"><s>S</s></label>
       <input type="checkbox" name="stri" id="stri">
      </div>
      <div>
       <button data-icon="save" data-iconpos="notext" @click="makefile"></button>
      </div>
     </div>
    </div>
  </body>
</html>
