<!DOCTYPE html>
<html lang="es">
  <head>
    <script src="cdn/jquery.js"></script>
    <script src="cdn/semantic.min.js"></script>
    <script src="cdn/jquery-ui.min.js"></script>
    <script src="cdn/jquery.ui.touch-punch.min.js"></script>
    <script src="cdn/jquery.mjs.nestedSortable.min.js"></script>
    <script src="cdn/jquery.mobile-1.3.2.min.js"></script>
    <script src="cdn/browser@4.js"></script>
    <script src="cdn/cdn.min.js" defer></script>
    <script src="cdn/calendar.min.js"></script>
    <script src="cdn/calendar.jquery.min.js"></script>
    <script src="cdn/calendar.translations.es.js"></script>
    <!--script src="cdn/p5.min.js"></script-->
    <script src="main.js"></script>
    <link rel="stylesheet" href="cdn/jquery.mobile-1.3.2.min.css"/>
    <link rel="stylesheet" href="cdn/semantic.min.css"/>
    <link rel="stylesheet" href="cdn/daisyui@5.css"/>
    <link rel="stylesheet" href="cdn/themes.css"/>
    <link rel="stylesheet" href="cdn/calendar.js.min.css"/>
    <link rel="stylesheet" href="style.css"/>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content">
  </head>
  <body x-data="inicio" x-effect="logocol()">
   <!--main page-->
    <div data-role="page" id="main">
      <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
       <img :src="logo">
       <div style="display: flex;">
        <button data-icon="plus" data-iconpos="notext"></button>
        <a class="squircle" data-role="button" data-icon="gear" data-iconpos="notext" href="#ajustes"></a>
       </div>
      </div>
      <div data-role="content" class="full" :data-theme="jqmtheme">
      </div>
      <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!---foter navbar--->
      </div>
    </div>
    <!--note page-->
    <div data-role="page" id="notas">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <span class="setui">
       <button data-icon="folder" @click="Capacitores.importarNota()">Importar</button>
       <a data-role="button" href="#edit" data-icon="plus" class="squircle" data-transition="none">Nueva nota</a>
      </span>
     </div>
     <div data-role="content" class="full" :data-theme="jqmtheme">
      <ul data-role="listview" id="lista-notas-locales" data-autodividers="true" data-filter="true">
      </ul>
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--calendar page-->
    <div data-role="page" id="calen">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <!--span>
       <button data-icon="plus" data-iconpos="right">Nuevo evento</button>
      </span-->
     </div>
     <div data-role="content" class="full" :data-theme="jqmtheme">
      <div id="calendar" class="squircle"></div>
      <script type="text/javascript" charset="utf-8">
      $('#calen').on('pageshow', function(e){
       const options = {
    useLocalStorageForEvents: true,
    ...__TRANSLATION_OPTIONS ? __TRANSLATION_OPTIONS : {}
   };
       const calendarInstance = $( "#calendar" ).calendarJs(options)[ 0 ]
       $("#calendar").addClass("calendar-initialized");
      })
      </script>
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--search page-->
    <div data-role="page" id="busca">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <form>
       <input type="search" name="barra-busca" id="barra-busca">
      </form>
     </div>
     <div data-role="content" class="full" :data-theme="jqmtheme">
      <p>Coming soon</p>
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--edit page-->
    <div data-role="page" id="edit">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <span>
       <a data-role="button" data-icon="back" data-iconpos="notext" href="#notas" class="squircle" data-transition="none"></a>
      </span>
      <img :src="logo">
      <span style="display: flex; align-items: center;">
       <button popovertarget="popadd" style="anchor-name:--addwid" data-icon="plus">Widget</button>
       <ul class="dropdown menu rounded-xl bg-base-300 squircle" popover id="popadd" style="position-anchor:--addwid">
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('title')">Titulo</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('text')">Texto</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('badge')">Etiqueta</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('div')">Divisor</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('flow')">Contenedor</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('image')">Imagen</button></li>
       </ul>
       <a data-role="button" data-icon="view" data-iconpos="notext" href="#view" class="squircle" data-transition="none"></a>
      </span>
     </div>
     <div data-role="content" class="full" :data-theme="jqmtheme">
      <div>
       <label for="namedoc">Nombre:</label>
       <input type="text" name="namedoc" id="namedoc">
      </div>
       <ul data-role="listview" data-inset="true" id="docreate" class="squircle sortable">
         
      </ul>
     </div>
     <div data-role="footer" data-position="fixed" :data-theme="jqmtheme">
      <span class="barui">
      <!--input type="color" name="" id="" value="" /-->
      <div data-role="controlgroup" data-type="horizontal" class="squircle">
       <label for="stng" ontouchstart="event.preventDefault(); aplicarFormato('stng')"><strong>B</strong></label>
       <input type="checkbox" name="stng" id="stng">
       <label for="ital" ontouchstart="event.preventDefault(); aplicarFormato('ital')"><em>I</em></label>
       <input type="checkbox" name="ital" id="ital">
       <label for="unde" ontouchstart="event.preventDefault(); aplicarFormato('unde')"><u>U</u></label>
       <input type="checkbox" name="unde" id="unde">
       <label for="stri" ontouchstart="event.preventDefault(); aplicarFormato('stri')"><s>S</s></label>
       <input type="checkbox" name="stri" id="stri">
      </div>
      <div data-role="controlgroup" data-type="horizontal">
       <button data-icon="save" data-iconpos="notext" @click="makefile"></button>
       <button data-icon="share" data-iconpos="notext" @click="Capacitores.compartirNota()"></button>
      </div>
      </span>
      <!--div x-html="editbar">
       
      </div-->
     </div>
    </div>
    <!--wysiwyg-->
    <div data-role="page" id="wysiwyg">
     <div data-role="header" data-position="fixed" :data-theme="jqmtheme">
      <span class="barui">
       <a data-role="button" data-icon="back" data-iconpos="notext" href="#notas" class="squircle" data-transition="none"></a>
      <img :src="logo" >
      <span style="display: flex; align-items: center;">
       <button popovertarget="popadd2" style="anchor-name:--addwid2" data-icon="plus">Widget</button>
       <ul class="dropdown menu rounded-xl bg-base-300 squircle" popover id="popadd2" style="position-anchor:--addwid2">
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('title')">Titulo</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('text')">Texto</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('badge')">Etiqueta</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('div')">Divisor</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('flow')">Contenedor</button></li>
        <li><button data-role="none" class="squircle edit-btn" @click="getfile.addtodoc('image')">Imagen</button></li>
       </ul>
       <a data-role="button" data-icon="view" data-iconpos="notext" href="#view" class="squircle" data-transition="none"></a>
      </span>
      </span>
      <span class="barui">
       <select name="textribon" data-role="slider" data-mini="true">
           <option value="false">No</option>
           <option value="true">Si</option>
          </select>
       <select name="textrhibon" data-mini="true">
           <option value="false">1</option>
           <option value="true">2</option>
          </select>
      </span>
     </div>
     <div data-role="content" class="full" data-theme="c" id="wysiwyg-content" style="padding: 0;">
      
     </div>
     <div data-role="footer" data-position="fixed" :data-theme="jqmtheme">
      <span class="barui">
      <!--input type="color" name="" id="" value="" /-->
      <div data-role="controlgroup" data-type="horizontal" class="squircle">
       <label for="stng2" ontouchstart="event.preventDefault(); aplicarFormato('stng');"><strong>B</strong></label>
       <input type="checkbox" name="stng" id="stng2">
       <label for="ital2" ontouchstart="event.preventDefault(); aplicarFormato('ital');"><em>I</em></label>
       <input type="checkbox" name="ital" id="ital2">
       <label for="unde2" ontouchstart="event.preventDefault(); aplicarFormato('unde');"><u>U</u></label>
       <input type="checkbox" name="unde" id="unde2">
       <label for="stri2" ontouchstart="event.preventDefault(); aplicarFormato('stri');"><s>S</s></label>
       <input type="checkbox" name="stri" id="stri2">
       </div>
       <div data-role="controlgroup" data-type="horizontal">
       <button data-icon="save" data-iconpos="notext" @click="makefile"></button>
       <button data-icon="share" data-iconpos="notext" @click="Capacitores.compartirNota()"></button>
      </div>
      </span>
      <div x-html="editbar">
       
      </div>
     </div>
    </div>
    <!--view page-->
    <div data-role="page" id="view">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <span>
       <a data-role="button" data-icon="back" data-iconpos="notext" href="#notas" class="squircle" data-transition="none"></a>
      </span>
      <h1 name="filename"></h1>
      <span class="setui">
       <button data-icon="share" data-iconpos="notext" @click="Capacitores.compartirNota()"></button>
       <a data-role="button" data-icon="edit" data-iconpos="notext" href="#edit" class="squircle" data-transition="none"></a>
      </span>
     </div>
     <div data-role="content" class="full" data-theme="c" id="preview2" style="padding: 0;" x-html="doc">
      
     </div>
    </div>
    <!--settings page-->
    <div data-role="page" id="ajustes">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <div><a data-role="button" data-icon="back" data-rel="back" href="#main" class="squircle">Regresar</a></div>
      <h1>Ajustes</h1>
     </div>
     <div data-role="content" :data-theme="jqmtheme" class="full">
       
      <div data-role="controlgroup" data-type="horizontal" id="jqm" class="squircle">
       <p>Tema</p>
       <button data-theme="a" @click="setheme('a')">a</button>
       <button data-theme="b" @click="setheme('b')">b</button>
       <button data-theme="c" @click="setheme('c')">c</button>
       <button data-theme="d" @click="setheme('d')">d</button>
       <button data-theme="e" @click="setheme('e')">e</button>
      </div>
     </div>
    </div>
  </body>
</html>
