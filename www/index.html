<!DOCTYPE html>
<html lang="es">
  <head>
    <script src="cdn/jquery.js"></script>
    <script src="cdn/jquery.mobile-1.3.2.min.js"></script>
    <script src="cdn/browser@4.js"></script>
    <script src="cdn/index.global.min.js"></script>
    <script src="cdn/cdn.min.js" defer></script>
    <script src="cdn/index.global.min.js"></script>
    <script src="main.js"></script>
    <link rel="stylesheet" href="cdn/jquery.mobile-1.3.2.min.css"/>
    <link rel="stylesheet" href="cdn/daisyui@5.css"/>
    <link rel="stylesheet" href="cdn/themes.css"/>
    <link rel="stylesheet" href="style.css"/>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body x-data="inicio" x-effect="logocol()">
   <!--main page-->
    <div data-role="page" id="main">
      <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
       <img :src="logo">
       <div data-role="controlgroup" data-type="horizontal">
        <button data-icon="plus" data-iconpos="notext"></button>
        <a data-ajax="false" data-role="button" data-icon="gear" data-iconpos="notext" href="set.html"></a>
       </div>
      </div>
      <div data-role="content" :data-theme="jqmtheme">
       <ul data-role="listview">
        <a href="#edit">#edit</a>
       </ul>
      </div>
      <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!---foter navbar--->
      </div>
    </div>
    <!--note page-->
    <div data-role="page" id="notas">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <span>
       <button data-icon="plus" data-iconpos="right">Nueva nota</button>
      </span>
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--calendar page-->
    <div data-role="page" id="calen">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <span>
       <button data-icon="plus" data-iconpos="right">Nuevo evento</button>
      </span>
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--search page-->
    <div data-role="page" id="busca">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo" >
      <form>
       <input type="search" name="barra-busca" id="barra-busca">
      </form>
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      <p>Coming soon</p>
     </div>
     <div x-html="navbar" data-role="footer" data-position="fixed" data-id="footr" :data-theme="jqmtheme">
      <!--footer navbar-->
     </div>
    </div>
    <!--edit page-->
    <div data-role="page" id="edit">
     <div data-role="header" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <img :src="logo">
      <span style="display: flex; align-items: center;">
       <button data-role="none" class="btn" popovertarget="popadd" style="anchor-name:--addwid">+ widget</button>
       <ul class="dropdown menu rounded-box bg-base-300" popover id="popadd" style="position-anchor:--addwid">
        <li><button data-role="none" class="squircle edit-btn">Texto</button></li>
       </ul>
       <a data-role="button" data-icon="view" href="#view">Ver</a>
       </span>
     </div>
     <div data-role="content" :data-theme="jqmtheme">
      <div>
       <label for="namedoc">Nombre:</label>
       <input type="text" name="namedoc" id="namedoc">
      </div>
      <ul data-role="listview" data-inset="true" id="doccreate">
       <li><div>
        <h1 class="setui">Titulo&nbsp<button data-icon="delete" data-iconpos="notext"></button></h1>
        <span class="setui">
         <input type="text" name="" id="" value="" />
         <button data-role="none" class="btn" popovertarget="titlefon" style="anchor-name: --backti;">Fondo</button>
         <ul class="dropdown menu rounded-box bg-base-200" popover id="titlefon" style="position-anchor: --backti;">
          <li><button data-theme="a">a</button></li>
          <li><button data-theme="b">b</button></li>
          <li><button data-theme="c">c</button></li>
          <li><button data-theme="d">d</button></li>
          <li><button data-theme="e">e</button></li>
         </ul>
        </span>
       </div></li>
       <li><div>
        <h1 class="setui">Texto&nbsp<button data-icon="delete" data-iconpos="notext"></button></h1>
        <textarea name="" id="" rows="8" cols="40"></textarea>
       </div></li>
       <li><div>
        <h1 class="setui">Imagen&nbsp <button data-icon="delete" data-iconpos="notext"></button></h1>
        <input data-role="none" type="file" class="file-input" accept="image/*"/>
       </div></li>
       <li><div>
        <h1 class="setui">Etiqueta&nbsp<button data-icon="delete" data-iconpos="notext"></button></h1>
        <span class="barui">
         <input type="text" name="" id="" value="" />
         <button data-role="none" class="btn" popovertarget="badgecol" style="anchor-name: --coleti;">Color</button>
         <ul class="dropdown menu rounded-box bg-base-200" popover id="badgecol" style="position-anchor: --coleti;">
          <li><button data-role="none" class="btn btn-primary" data-theme="light">Color 1</button></li>
          <li><button data-role="none" class="btn btn-secondary" data-theme="light">Color 2</button></li>
         </ul>
        </span>
       </div></li>
       <li><div>
        <h1 class="setui">Divisor&nbsp <button data-icon="delete" data-iconpos="notext"></button></h1>
       </div></li>
      </ul>
     </div>
     <div data-role="footer" class="barui" data-position="fixed" :data-theme="jqmtheme">
      <input type="color" name="" id="" value="" />
      <input type="number" name="" id="" value="" />
      <div>
       <button>Guardar</button>
      </div>
     </div>
    </div>
  </body>
</html>
